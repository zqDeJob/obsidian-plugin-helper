name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Verify plugin assets
        run: test -f main.js && test -f manifest.json && test -f styles.css

      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            styles.css

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            styles.css
          generate_release_notes: false
          body: |
            见仓库 README。插件内界面为中文。

name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Verify plugin assets
        run: test -f main.js && test -f manifest.json && test -f styles.css

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            styles.css
          generate_release_notes: false
          body: |
            ## 插件说明书 v1.0.0

            - 侧边栏：官方说明（原文 + 中文注释）+ 可编辑「我的说明」
            - 弹窗：官方说明只读查阅
            - 自动从 Obsidian 社区拉取说明并翻译为简体中文
